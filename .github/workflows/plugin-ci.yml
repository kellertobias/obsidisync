name: Plugin CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin:
    name: Test and build plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test plugin
        run: npm run test:plugin

      - name: Build plugin
        run: npm run build:plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidisync-plugin
          path: |
            main.js
            manifest.json
          if-no-files-found: error

  release:
    name: Publish plugin release assets
    runs-on: ubuntu-latest
    needs: plugin
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          node -e "const version = process.argv[1]; if (!/^\\d+\\.\\d+\\.\\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) { console.error(`Tag ${process.env.GITHUB_REF_NAME} is not a supported semver release tag`); process.exit(1); }" "$version"
          npm version "$version" --no-git-tag-version --allow-same-version
          node scripts/sync-version.mjs "$version"
          node -e "const pkg = require('./package.json'); const manifest = require('./manifest.json'); if (pkg.version !== manifest.version) { console.error(`package.json version ${pkg.version} does not match manifest version ${manifest.version}`); process.exit(1); }"

      - name: Build plugin
        run: npm run build:plugin

      - name: Package plugin release
        run: |
          assets=(main.js manifest.json)
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi
          zip -r plugin.zip "${assets[@]}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          assets=(main.js manifest.json plugin.zip)
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi

          if [ "$GITHUB_SERVER_URL" = "https://github.com" ]; then
            if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
              gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
            else
              gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --notes "Obsidian plugin release $GITHUB_REF_NAME"
            fi
            exit 0
          fi

          api="${GITHUB_SERVER_URL%/}/api/v1"
          repo="$GITHUB_REPOSITORY"
          auth_header="Authorization: token $GITHUB_TOKEN"
          release_json="$(mktemp)"

          status="$(
            curl -sS -o "$release_json" -w "%{http_code}" \
              -H "$auth_header" \
              "$api/repos/$repo/releases/tags/$GITHUB_REF_NAME"
          )"

          if [ "$status" = "404" ]; then
            status="$(
              curl -sS -o "$release_json" -w "%{http_code}" \
                -X POST \
                -H "$auth_header" \
                -H "Content-Type: application/json" \
                --data "$(node -e "console.log(JSON.stringify({ tag_name: process.env.GITHUB_REF_NAME, name: process.env.GITHUB_REF_NAME, body: 'Obsidian plugin release ' + process.env.GITHUB_REF_NAME }))")" \
                "$api/repos/$repo/releases"
            )"
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            cat "$release_json"
            exit 1
          fi

          release_id="$(node -e "console.log(require(process.argv[1]).id)" "$release_json")"
          for asset in "${assets[@]}"; do
            node -e "const release = require(process.argv[1]); const name = process.argv[2]; for (const asset of release.assets || []) if (asset.name === name) console.log(asset.id)" "$release_json" "$asset" |
              while read -r asset_id; do
                [ -n "$asset_id" ] || continue
                curl -fsS -X DELETE -H "$auth_header" "$api/repos/$repo/releases/assets/$asset_id"
              done

            curl -fsS \
              -X POST \
              -H "$auth_header" \
              -F "attachment=@$asset" \
              "$api/repos/$repo/releases/$release_id/assets?name=$asset"
          done
