name: Plugin CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin:
    name: Test and build plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test plugin
        run: npm run test:plugin

      - name: Build plugin
        run: npm run build:plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidisync-plugin
          path: |
            main.js
            manifest.json
          if-no-files-found: error

  release:
    name: Publish plugin release assets
    runs-on: ubuntu-latest
    needs: plugin
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          node -e "const manifest = require('./manifest.json'); if (manifest.version !== process.env.GITHUB_REF_NAME) { console.error(`Tag ${process.env.GITHUB_REF_NAME} must match manifest version ${manifest.version}`); process.exit(1); }"

      - name: Build plugin
        run: npm run build:plugin

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json --title "$GITHUB_REF_NAME" --notes "Obsidian plugin release $GITHUB_REF_NAME"
          fi
