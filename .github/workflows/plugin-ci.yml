name: Plugin CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin:
    name: Test and build plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test plugin
        run: npm run test:plugin

      - name: Build plugin
        run: npm run build:plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidisync-plugin
          path: |
            main.js
            manifest.json
          if-no-files-found: error

  docker:
    name: Build and push container image
    runs-on: ubuntu-latest
    needs: plugin
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Publish plugin release assets
    runs-on: ubuntu-latest
    needs: [plugin, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          node -e "const version = process.argv[1]; if (!/^\\d+\\.\\d+\\.\\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) { console.error(`Tag ${process.env.GITHUB_REF_NAME} is not a supported semver release tag`); process.exit(1); }" "$version"
          npm version "$version" --no-git-tag-version --allow-same-version
          node scripts/sync-version.mjs "$version"
          node -e "const pkg = require('./package.json'); const manifest = require('./manifest.json'); if (pkg.version !== manifest.version) { console.error(`package.json version ${pkg.version} does not match manifest version ${manifest.version}`); process.exit(1); }"

      - name: Build plugin
        run: npm run build:plugin

      - name: Package plugin release
        run: |
          assets=(main.js manifest.json)
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi
          zip -r plugin.zip "${assets[@]}"

      - name: Write release notes
        run: |
          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${repo_lc}"
          package="$(basename "${repo_lc}")"
          {
            printf 'Obsidian plugin release %s.\n\n' "$GITHUB_REF_NAME"
            printf '### Sync server container image\n\n'
            printf 'The sync server is published to the GitHub Container Registry:\n\n'
            printf '```bash\n'
            printf 'docker pull %s:%s\n' "$image" "$GITHUB_REF_NAME"
            printf '```\n\n'
            printf -- '- `%s:%s`\n' "$image" "$GITHUB_REF_NAME"
            printf -- '- `%s:latest`\n\n' "$image"
            printf 'Image page: https://github.com/%s/pkgs/container/%s\n' "$GITHUB_REPOSITORY" "$package"
          } > release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(main.js manifest.json plugin.zip)
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
